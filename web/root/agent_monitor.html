<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASOE Agent Log Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --orange: #f0883e;
    --text: #e6edf3;
    --muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .live-dot.paused { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: none; }
  .live-dot.error  { background: var(--red);    box-shadow: 0 0 6px var(--red);    animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }
  .stat-pill {
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .stat-pill span { color: var(--text); font-weight: 600; }
  .stat-pill .v-err  { color: var(--red); }
  .stat-pill .v-warn { color: var(--yellow); }
  .spacer { flex: 1; }
  .filter-input {
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    width: 200px;
    outline: none;
  }
  .filter-input:focus { border-color: var(--blue); }
  .filter-input::placeholder { color: var(--muted); }
  .btn {
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #30363d; }
  .btn.active { border-color: var(--blue); color: var(--blue); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .level-btn {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    background: #21262d;
    color: var(--muted);
    transition: all 0.15s;
  }
  .level-btn.active-REQ   { background: #1a2c1a; border-color: var(--green);  color: var(--green);  }
  .level-btn.active-APPL  { background: #1a1f2c; border-color: var(--blue);   color: var(--blue);   }
  .level-btn.active-LOG   { background: #2c2a1a; border-color: var(--yellow); color: var(--yellow); }
  .level-btn.active-ERROR { background: #2c1a1a; border-color: var(--red);    color: var(--red);    }
  .statusbar {
    background: #0d1117;
    border-bottom: 1px solid var(--border);
    padding: 5px 16px;
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    align-items: center;
  }
  .statusbar .last-update { margin-left: auto; }
  .console-header {
    display: grid;
    grid-template-columns: 90px 70px 60px 130px 60px 1fr;
    gap: 0 10px;
    padding: 5px 16px;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .console {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .console::-webkit-scrollbar { width: 6px; }
  .console::-webkit-scrollbar-track { background: transparent; }
  .console::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .log-row {
    display: grid;
    grid-template-columns: 90px 70px 60px 130px 60px 1fr;
    gap: 0 10px;
    padding: 2px 16px;
    line-height: 1.65;
    border-left: 3px solid transparent;
    border-bottom: 1px solid transparent;
    animation: fadeIn 0.2s ease;
  }
  .log-row:hover { background: #161b22; border-bottom-color: var(--border); }
  .log-row.row-ERROR { border-left-color: var(--red);    background: rgba(248,81,73,0.04); }
  .log-row.row-WARN  { border-left-color: var(--yellow); background: rgba(210,153,34,0.04); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-2px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .col-time    { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .col-pid     { color: #6e7681; font-size: 11px; }
  .col-agent   { color: var(--purple); font-size: 11px; font-weight: 600; }
  .col-session { color: #6e7681; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-level   { font-weight: 700; font-size: 11px; }
  .col-msg     { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lv-REQ   { color: #3fb950; }
  .lv-APPL  { color: #58a6ff; }
  .lv-LOG   { color: #d29922; }
  .lv-ERROR { color: #f85149; }
  .lv-WARN  { color: #f0883e; }
  .lv-OTHER { color: var(--muted); }
  .new-badge {
    display: inline-block;
    background: #3fb950;
    color: #000;
    font-size: 9px;
    font-weight: 900;
    padding: 1px 4px;
    border-radius: 3px;
    margin-right: 5px;
    vertical-align: middle;
    animation: badgeFade 2.5s ease forwards;
  }
  @keyframes badgeFade { 0%{opacity:1} 60%{opacity:1} 100%{opacity:0} }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <div class="live-dot" id="liveDot"></div>
    PASOE Agent Log Monitor
  </div>
  <div class="stat-pill">Total <span id="statTotal">--</span></div>
  <div class="stat-pill">Shown <span id="statShown">--</span></div>
  <div class="stat-pill">ERR <span class="v-err" id="cntErr">0</span></div>
  <div class="stat-pill">WARN <span class="v-warn" id="cntWarn">0</span></div>
  <div class="spacer"></div>
  <button class="level-btn" id="btnREQ"   onclick="toggleLevel('REQ')">REQ</button>
  <button class="level-btn" id="btnAPPL"  onclick="toggleLevel('APPL')">APPL</button>
  <button class="level-btn" id="btnLOG"   onclick="toggleLevel('LOG')">LOG</button>
  <button class="level-btn" id="btnERROR" onclick="toggleLevel('ERROR')">ERROR</button>
  <input class="filter-input" id="filterInput" type="text" placeholder="Filter message / agent / session..." oninput="applyFilter()">
  <button class="btn" onclick="cycleLines()">Show: <span id="lineLabelTxt">100</span></button>
  <button class="btn" id="btnPause" onclick="togglePause()">|| Pause</button>
  <button class="btn danger" onclick="clearConsole()">Clear</button>
</div>

<div class="console-header">
  <span>Time</span>
  <span>PID</span>
  <span>Agent</span>
  <span>Session</span>
  <span>Level</span>
  <span>Message</span>
</div>

<div class="statusbar">
  <span>REQ: <span style="color:#3fb950;font-weight:600" id="cntReq">0</span></span>
  <span>APPL: <span style="color:#58a6ff;font-weight:600" id="cntAppl">0</span></span>
  <span>LOG: <span style="color:#d29922;font-weight:600" id="cntLog">0</span></span>
  <span>OTHER: <span style="color:#8b949e;font-weight:600" id="cntOther">0</span></span>
  <span class="last-update">Updated: <span id="lastUpdate">--</span></span>
</div>

<div class="console" id="console">
  <div class="empty-state" id="emptyState">
    <div>[ waiting for agent log entries... ]</div>
  </div>
</div>

<script>
  var API_URL     = '/web/mcp';
  var INTERVAL_MS = 1000;
  var LINE_STEPS  = [50, 100, 200, 500];
  var rpcId       = 1;

  var paused      = false;
  var filterText  = '';
  var lineStepIdx = 1;
  var knownSet    = {};
  var shownRows   = [];
  var levelFilter = {};
  var counts      = { req:0, appl:0, log:0, err:0, warn:0, other:0 };
  var totalFromServer = 0;

  // ── JSON-RPC 2.0 ─────────────────────────────────────────
  function buildRpcBody(toolName, args) {
    return JSON.stringify({
      jsonrpc: '2.0',
      id: rpcId++,
      method: 'tools/call',
      params: { name: toolName, arguments: args }
    });
  }

  function extractPayload(data) {
    if (data.error) { console.error('RPC error:', data.error); return null; }
    var result = data.result;
    if (!result) return null;
    if (result.content && result.content.length > 0) {
      var text = result.content[0].text;
      if (typeof text === 'string') {
        try { return JSON.parse(text); } catch(e) { console.error('JSON parse error:', e); return null; }
      }
      if (typeof text === 'object') return text;
    }
    if (result.lines)  return result;
    if (result.result) return result.result;
    return result;
  }

  // ── Parse agent log line ──────────────────────────────────
  // Format: 2026-03-20T10:02:09.405+0100 019424 016272 1 AS-4 ROOT:w:0000008e REQ   Request tools/call
  //         [0]timestamp                 [1]pid  [2]tid [3]n [4]agent [5]session [6]level [7+]message
  function parseAgentLine(raw) {
    var time = '', pid = '', agent = '', session = '', level = 'OTHER', msg = raw;

    var parts = raw.split(/\s+/);
    if (parts.length < 7) {
      return { raw:raw, time:'', pid:'', agent:'', session:'', level:'OTHER', msg:raw };
    }

    var ts = parts[0];
    var tIdx = ts.indexOf('T');
    time = (tIdx >= 0) ? ts.substring(tIdx + 1, tIdx + 9) : ts.substring(0, 8);

    pid     = parts[1];
    // parts[2] = TID, parts[3] = agent number
    agent   = parts[4];
    session = parts[5];
    level   = parts[6] || 'OTHER';

    msg = parts.slice(7).join(' ');
    if (!msg) msg = '(no message)';

    // Normalize level
    var lvlMap = { REQ:'REQ', APPL:'APPL', LOG:'LOG', ERROR:'ERROR', ERR:'ERROR', WARN:'WARN', WARNING:'WARN' };
    level = lvlMap[level] || 'OTHER';

    return { raw:raw, time:time, pid:pid, agent:agent, session:session, level:level, msg:msg };
  }

  // ── Level filter buttons ──────────────────────────────────
  function toggleLevel(lvl) {
    var btn = document.getElementById('btn' + lvl);
    if (levelFilter[lvl]) {
      delete levelFilter[lvl];
      btn.className = 'level-btn';
    } else {
      levelFilter[lvl] = true;
      btn.className = 'level-btn active-' + lvl;
    }
    applyFilter();
  }

  // ── Visibility check ──────────────────────────────────────
  function rowVisible(entry) {
    var hasLvlFilter = Object.keys(levelFilter).length > 0;
    if (hasLvlFilter && !levelFilter[entry.level]) return false;
    if (filterText) {
      var hay = (entry.msg + ' ' + entry.agent + ' ' + entry.session + ' ' + entry.level).toLowerCase();
      if (hay.indexOf(filterText) < 0) return false;
    }
    return true;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Render one row ────────────────────────────────────────
  function renderRow(entry, isNew) {
    var div = document.createElement('div');
    var cls = 'log-row';
    if (entry.level === 'ERROR') cls += ' row-ERROR';
    else if (entry.level === 'WARN') cls += ' row-WARN';
    div.className = cls;
    if (!rowVisible(entry)) div.style.display = 'none';

    var badge = isNew ? '<span class="new-badge">NEW</span>' : '';
    var sessionShort = entry.session.length > 14 ? entry.session.substring(0, 6) + '..' + entry.session.slice(-6) : entry.session;

    div.innerHTML =
      '<span class="col-time">'    + entry.time + '</span>' +
      '<span class="col-pid">'     + escHtml(entry.pid) + '</span>' +
      '<span class="col-agent">'   + escHtml(entry.agent) + '</span>' +
      '<span class="col-session" title="' + escHtml(entry.session) + '">' + escHtml(sessionShort) + '</span>' +
      '<span class="col-level lv-' + entry.level + '">' + entry.level + '</span>' +
      '<span class="col-msg">'     + badge + escHtml(entry.msg) + '</span>';

    return div;
  }

  // ── Main fetch loop ───────────────────────────────────────
  function fetchLog() {
    if (paused) return;
    var lineCount = LINE_STEPS[lineStepIdx];

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: buildRpcBody('agent_log_tail', { lines: lineCount })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (rpcId <= 3) console.log('Agent RPC:', JSON.stringify(data).substring(0, 400));

      var payload = extractPayload(data);
      if (!payload) {
        document.getElementById('liveDot').className = 'live-dot error';
        document.getElementById('lastUpdate').textContent = 'Parse error - check console';
        return;
      }

      document.getElementById('liveDot').className = 'live-dot';
      var lines = payload.lines || [];
      totalFromServer = payload.total_lines || lines.length;

      var consoleEl = document.getElementById('console');
      var newCount  = 0;

      lines.forEach(function(raw) {
        if (!raw || knownSet[raw]) return;
        knownSet[raw] = true;
        newCount++;

        var entry = parseAgentLine(raw);
        shownRows.push(entry);

        if      (entry.level === 'REQ')   counts.req++;
        else if (entry.level === 'APPL')  counts.appl++;
        else if (entry.level === 'LOG')   counts.log++;
        else if (entry.level === 'ERROR') counts.err++;
        else if (entry.level === 'WARN')  counts.warn++;
        else                              counts.other++;
      });

      var emptyEl = document.getElementById('emptyState');
      if (shownRows.length > 0 && emptyEl) emptyEl.remove();

      if (newCount > 0) {
        var toShow = shownRows.slice(-lineCount);
        consoleEl.innerHTML = '';
        toShow.forEach(function(entry, idx) {
          var isNew = idx >= toShow.length - newCount;
          consoleEl.appendChild(renderRow(entry, isNew));
        });
        consoleEl.scrollTop = consoleEl.scrollHeight;
      }

      document.getElementById('statTotal').textContent  = totalFromServer;
      document.getElementById('statShown').textContent  = shownRows.length;
      document.getElementById('cntErr').textContent     = counts.err;
      document.getElementById('cntWarn').textContent    = counts.warn;
      document.getElementById('cntReq').textContent     = counts.req;
      document.getElementById('cntAppl').textContent    = counts.appl;
      document.getElementById('cntLog').textContent     = counts.log;
      document.getElementById('cntOther').textContent   = counts.other;

      var d = new Date();
      document.getElementById('lastUpdate').textContent = d.toTimeString().substring(0, 8);
    })
    .catch(function(e) {
      document.getElementById('liveDot').className = 'live-dot error';
      document.getElementById('lastUpdate').textContent = 'Error: ' + e.message;
      console.error('Fetch error:', e);
    });
  }

  // ── Controls ──────────────────────────────────────────────
  function togglePause() {
    paused = !paused;
    var dot = document.getElementById('liveDot');
    var btn = document.getElementById('btnPause');
    if (paused) {
      dot.className = 'live-dot paused';
      btn.textContent = '> Play';
      btn.classList.add('active');
    } else {
      dot.className = 'live-dot';
      btn.textContent = '|| Pause';
      btn.classList.remove('active');
    }
  }

  function cycleLines() {
    lineStepIdx = (lineStepIdx + 1) % LINE_STEPS.length;
    document.getElementById('lineLabelTxt').textContent = LINE_STEPS[lineStepIdx];
  }

  function clearConsole() {
    knownSet  = {};
    shownRows = [];
    counts    = { req:0, appl:0, log:0, err:0, warn:0, other:0 };
    document.getElementById('console').innerHTML =
      '<div class="empty-state" id="emptyState"><div>[ waiting for agent log entries... ]</div></div>';
    ['statTotal','statShown'].forEach(function(id){ document.getElementById(id).textContent = '--'; });
    ['cntErr','cntWarn','cntReq','cntAppl','cntLog','cntOther'].forEach(function(id){
      document.getElementById(id).textContent = '0';
    });
  }

  function applyFilter() {
    filterText = document.getElementById('filterInput').value.toLowerCase().trim();
    document.querySelectorAll('.log-row').forEach(function(row) {
      var msg     = (row.querySelector('.col-msg')     || {textContent:''}).textContent.toLowerCase();
      var agent   = (row.querySelector('.col-agent')   || {textContent:''}).textContent.toLowerCase();
      var session = (row.querySelector('.col-session') || {title:''}).title.toLowerCase();
      var lvl     = (row.querySelector('.col-level')   || {textContent:''}).textContent;

      var hasLvlFilter = Object.keys(levelFilter).length > 0;
      var lvlOk = !hasLvlFilter || !!levelFilter[lvl];
      var txtOk = !filterText || (msg + ' ' + agent + ' ' + session + ' ' + lvl.toLowerCase()).indexOf(filterText) >= 0;
      row.style.display = (lvlOk && txtOk) ? '' : 'none';
    });
  }

  // ── Start ─────────────────────────────────────────────────
  fetchLog();
  setInterval(fetchLog, INTERVAL_MS);
</script>
</body>
</html>
